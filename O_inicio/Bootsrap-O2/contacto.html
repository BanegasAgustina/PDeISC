<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactanos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark" style="background-color: #d6001c;">
        <div class="container-fluid px-4">
            <a href="clima.html" class="text-white fw-bold fs-5 text-decoration-none">Clima 20°</a>
            <a class="navbar-brand fw-bold fs-2" href="index.html">0223</a>
            <a href="contacto.html" class="text-white fw-bold fs-5 text-decoration-none">Contacto</a>
        </div>
    </nav>

    <!-- FORMULARIO -->
    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8">

                <form class="needs-validation card border-0 shadow-sm p-4" novalidate>
                    <h3 class="mb-4">Contactanos</h3>

                    <!-- Nombre -->
                    <div class="mb-3">
                        <label class="form-label">Nombre completo</label>
                        <input type="text" class="form-control" placeholder="Ej. María González" required>
                        <div class="invalid-feedback">Por favor ingresá tu nombre.</div>
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" class="form-control" placeholder="nombre@ejemplo.com" required>
                        <div class="invalid-feedback">Ingresá un correo electrónico válido.</div>
                    </div>

                    <!-- Asunto -->
                    <div class="mb-3">
                        <label class="form-label">Asunto</label>
                        <select class="form-select" required>
                            <option value="" disabled selected>Seleccioná una opción</option>
                            <option>Consulta general</option>
                            <option>Soporte técnico</option>
                            <option>Ventas</option>
                            <option>Otro</option>
                        </select>
                        <div class="invalid-feedback">Seleccioná un asunto.</div>
                    </div>

                    <!-- Mensaje -->
                    <div class="mb-4">
                        <label class="form-label">Mensaje</label>
                        <textarea class="form-control" rows="4" placeholder="Escribí tu mensaje aquí..." required></textarea>
                        <div class="invalid-feedback">Por favor escribí tu mensaje.</div>
                    </div>

                    <!-- Botón -->
                    <div class="text-end">
                        <button type="submit" class="btn text-white px-4" style="background-color: #d6001c;">
                            Enviar mensaje
                        </button>
                    </div>

                </form>

            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="text-white py-3 mt-5" style="background-color: #d6001c;">
        <div class="container d-flex justify-content-between">
            <span>Agustina Banegas</span>
            <span>Noticias día a día</span>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Validación -->
    <script>
        (() => {
            'use strict';
            const forms = document.querySelectorAll('.needs-validation');
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                    form.classList.add('was-validated');
                }, false);
            });
        })();
    </script>

</body>
</html>
